syntax = "proto3";
package Protocol;

import "Enum.proto";
import "Struct.proto";


// ==========================================
//  Client -> Server
// ==========================================
message CS_LOGIN_PACKET {
	string account_id = 1;
	string account_pw = 2;
	bool is_dummy = 3;
}

message CS_SIGNUP_PACKET {
	string account_id = 1;
	string account_pw = 2;
	PlayerType player_type = 3;
}

message CS_LOGOUT_PACKET {
}

message CS_CHAT_PACKET {
	string message = 1;
}

message CS_ENTER_ROOM_PACKET {
	bool result = 1;
}

message CS_LEAVE_ROOM_PACKET {

}

message CS_MOVE_PACKET {
  PositionInfo pos_info = 1;
  bool force = 2;
}

message CS_DMOVE_PACKET {
  float input_x = 1;
  float input_y = 2;
}

message CS_ATTACK_PACKET {
  int32 target_id = 1;
}

// ==========================================
//  Server -> Client
// ==========================================

message SC_LOGIN_INFO_PACKET {
  ObjectInfo object_info = 1;
}

message SC_SIGNUP_PACKET {
  bool result = 1;
}

message SC_ADD_OBJECT_PACKET {
  ObjectInfo object_info = 1;
}

message SC_REMOVE_OBJECT_PACKET {
  int32 object_id = 1;
}

message SC_CHAT_PACKET {
  int32 sender_id = 1;
  string message = 2;
}

message SC_MOVE_PACKET {
  ObjectInfo object_info = 1;
  uint32 move_time = 2; 
}

message SC_ATTACK_PACKET {
  int32 attacker_id = 1;
  int32 skill_id = 2;
  int32 target_id = 3;
}

message SC_DAMAGE_PACKET {
  int32 attacker_id = 1;
  int32 target_id = 2;
  int32 damage = 3;
  int32 remain_hp = 4;
}

message SC_DEAD_PACKET {
  int32 object_id = 1;
}